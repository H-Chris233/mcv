name: Release

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - run: cargo install cargo-ndk --locked
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.1" "ndk;27.2.12479018"
      - run: ../gradlew ktlintCheck detekt lintDebug test assembleDebug
      - name: Generate checksums
        run: |
          cd app/build/outputs/apk/debug
          sha256sum app-debug.apk > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: mcv-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/SHA256SUMS
            docs/release-notes-v0.1.0.md
            docs/known-issues.md
            docs/manual-nfc-test-record.md
